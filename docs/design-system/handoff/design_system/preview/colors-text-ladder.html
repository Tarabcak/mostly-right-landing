<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#0a0a0a; color:#fff; font-family: var(--font-mono);}
  .stack { display:flex; flex-direction:column; border:1px solid var(--border-default); }
  .row { display:flex; align-items:center; padding:10px 16px; border-bottom:1px solid var(--border-default); gap:16px;}
  .row:last-child { border-bottom:0; }
  .chip { width:36px; height:24px; background:#fff; flex-shrink:0; }
  .name { flex:1; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color: var(--text-heading);}
  .val { font-size:11px; color: var(--text-faint);}
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="chip" style="background:rgba(255,255,255,1)"></div><div class="name">text-primary</div><div class="val">#fff / 100%</div></div>
    <div class="row"><div class="chip" style="background:rgba(255,255,255,.9)"></div><div class="name">text-heading</div><div class="val">#fff / 90%</div></div>
    <div class="row"><div class="chip" style="background:rgba(255,255,255,.55)"></div><div class="name">text-body</div><div class="val">#fff / 55%</div></div>
    <div class="row"><div class="chip" style="background:rgba(255,255,255,.5)"></div><div class="name">text-muted</div><div class="val">#fff / 50%</div></div>
    <div class="row"><div class="chip" style="background:rgba(255,255,255,.35)"></div><div class="name">text-subtle</div><div class="val">#fff / 35%</div></div>
    <div class="row"><div class="chip" style="background:rgba(255,255,255,.25)"></div><div class="name">text-faint</div><div class="val">#fff / 25%</div></div>
  </div>
</body></html>
