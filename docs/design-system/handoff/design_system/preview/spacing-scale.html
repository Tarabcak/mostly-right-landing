<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#0a0a0a; color:#fff; font-family: var(--font-mono);}
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap:12px;}
  .box { border:1px solid var(--border-default); padding:12px; display:flex; flex-direction:column; gap:8px; align-items:center; justify-content:center; min-height:92px;}
  .sq { background:#fff; }
  .n { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color: var(--text-subtle);}
  .v { font-size:10px; color: var(--text-faint);}
</style></head>
<body>
  <div class="grid">
    <div class="box"><div class="sq" style="width:4px;height:4px"></div><div class="n">sp-1</div><div class="v">4</div></div>
    <div class="box"><div class="sq" style="width:8px;height:8px"></div><div class="n">sp-2</div><div class="v">8</div></div>
    <div class="box"><div class="sq" style="width:16px;height:16px"></div><div class="n">sp-3</div><div class="v">16</div></div>
    <div class="box"><div class="sq" style="width:24px;height:24px"></div><div class="n">sp-4</div><div class="v">24</div></div>
    <div class="box"><div class="sq" style="width:32px;height:32px"></div><div class="n">sp-5</div><div class="v">32</div></div>
    <div class="box"><div class="sq" style="width:48px;height:48px"></div><div class="n">sp-6</div><div class="v">48</div></div>
  </div>
</body></html>
