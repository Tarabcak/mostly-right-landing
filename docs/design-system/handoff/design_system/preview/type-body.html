<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#0a0a0a; color:#fff; font-family: var(--font-mono);}
  .stack { display:flex; flex-direction:column; gap:18px;}
  .row { display:grid; grid-template-columns: 120px 1fr auto; gap:16px; align-items:baseline; padding-bottom:16px; border-bottom:1px solid var(--border-default);}
  .row:last-child { border-bottom:0; padding-bottom:0;}
  .tag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color: var(--text-subtle);}
  .size { font-size:10px; color: var(--text-faint); text-align:right;}
  .body { font-size:14px; line-height:1.85; color: var(--text-body);}
  .body-small { font-size:13px; line-height:1.75; color: var(--text-subtle);}
  .label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color: var(--text-faint);}
  .interactive { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color: var(--text-primary);}
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="tag">Body · Mono 400</div><div class="body">pip install mostlyright. One schema for Kalshi and Polymarket.</div><div class="size">14/1.85</div></div>
    <div class="row"><div class="tag">Body-small</div><div class="body-small">We use it to trade every day.</div><div class="size">13/1.75</div></div>
    <div class="row"><div class="tag">Label · Mono 700</div><div class="label">LAUNCHING WITH</div><div class="size">11 · .12em</div></div>
    <div class="row"><div class="tag">Interactive</div><div class="interactive">GET EARLY ACCESS →</div><div class="size">12 · .06em</div></div>
  </div>
</body></html>
