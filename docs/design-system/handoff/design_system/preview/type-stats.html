<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#0a0a0a; color:#fff; font-family: var(--font-mono); font-variant-numeric: tabular-nums;}
  .block { border:1px solid var(--border-default); padding:20px 24px; }
  .stat { font-family: var(--font-display); font-weight:400; font-size:48px; line-height:1; letter-spacing:-0.03em; color:#fff;}
  .unit { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color: var(--text-muted); margin-top:10px;}
  .detail { font-size:12px; line-height:1.7; color: var(--text-subtle); margin-top:12px;}
  .row { display:grid; grid-template-columns: 1fr 1fr; gap:0; border:1px solid var(--border-default);}
  .row > .block { border:0; border-right:1px solid var(--border-default);}
  .row > .block:last-child { border-right:0;}
</style></head>
<body>
  <div class="row">
    <div class="block">
      <div class="stat">$2B → $23B</div>
      <div class="unit">Monthly volume · Aug '25 → Feb '26</div>
      <div class="detail">tabular-nums mandatory · Funnel Display 400</div>
    </div>
    <div class="block">
      <div class="stat">75%</div>
      <div class="unit">Win rate · 60 days · 500+ trades</div>
      <div class="detail">Kerning: −0.03em. Line-height 1. Left-aligned.</div>
    </div>
  </div>
</body></html>
